# =========================================
# Server
# =========================================
server.port=8080

# Makes an unmapped request path (e.g. a typo'd URL, or a trailing
# slash that doesn't match any @RequestMapping) throw a catchable
# NoHandlerFoundException instead of silently falling back to the
# servlet container's default 404 page. Paired with add-mappings=false
# so static resource handling doesn't swallow it first.
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

