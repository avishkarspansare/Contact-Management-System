# =========================================
# Server
# =========================================
server.port=8080

# =========================================
# PostgreSQL Datasource
# Update username/password to match your local PostgreSQL setup.
# Create the database first: CREATE DATABASE contact_management_db;
# =========================================
spring.datasource.url=jdbc:postgresql://ep-noisy-truth-atdyo6bh-pooler.c-9.us-east-1.aws.neon.tech/contact_management_db?sslmode=require

spring.datasource.username=neondb_owner
spring.datasource.password=npg_JvFEAQ7LU3wP
# spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# JPA / Hibernate
# ddl-auto=update will auto-create/alter the "contacts" table on startup.
# Switch to "validate" once the schema is stable in a real deployment.
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =========================================
# Jackson (date formatting in JSON responses)
# =========================================
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata

# =========================================
# Logging
# =========================================
logging.level.com.technohacks.contactapi=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# =========================================
# App info
# =========================================
spring.application.name=contact-api
